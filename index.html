<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>以文说艺 · 文章总目录</title>
<style>
  :root {
    --bg: #FAF8F5; --card: #FFFFFF; --dark: #2C3E50; --accent: #C75B39;
    --accent2: #8B6F4E; --border: #E8E4DF; --gold: #C9A96E; --gray: #7A8A99;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--dark);
    font-family: "Noto Serif SC", "Songti SC", "SimSun", serif; min-height: 100vh; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 22px 80px; }

  header.hero { background: var(--dark); color: #fff; padding: 56px 22px 44px;
    text-align: center; position: relative; }
  header.hero::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0;
    height: 4px; background: var(--accent); }
  .brand { font-size: 15px; letter-spacing: .5em; color: var(--gold); margin-bottom: 18px;
    text-indent: .5em; }
  h1 { font-size: 34px; font-weight: 900; letter-spacing: .06em; }
  .subtitle { margin-top: 14px; font-size: 15px; color: #B8C4CE; line-height: 1.8; }
  .count { display: inline-block; margin-top: 20px; font-size: 13px; color: var(--gold);
    border: 1px solid rgba(201,169,110,.4); border-radius: 20px; padding: 5px 18px; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    justify-content: space-between; margin: 30px 0 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { font-size: 14px; padding: 6px 16px; border-radius: 18px; border: 1px solid var(--border);
    background: var(--card); color: var(--dark); cursor: pointer; transition: all .2s; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  #search { font-size: 14px; padding: 8px 16px; border-radius: 18px; border: 1px solid var(--border);
    background: var(--card); width: 180px; outline: none; font-family: inherit; }
  #search:focus { border-color: var(--accent); }

  .list { margin-top: 18px; display: flex; flex-direction: column; gap: 14px; }
  a.card { display: block; background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 56px 22px 24px; text-decoration: none; color: inherit;
    transition: transform .18s, box-shadow .18s; position: relative; overflow: hidden; }
  a.card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--accent); opacity: 0; transition: opacity .18s; }
  a.card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(44,62,80,.10); }
  a.card:hover::before { opacity: 1; }
  .meta { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .cat { font-size: 12px; color: #fff; background: var(--accent2); border-radius: 10px;
    padding: 2px 10px; letter-spacing: .05em; }
  .cat.公众号文章 { background: var(--accent); }
  .cat.知识卡片 { background: #5B8A72; }
  .cat.海报 { background: var(--accent2); }
  .cat.演讲幻灯片 { background: #6B7B94; }
  .date { font-size: 12px; color: var(--gray); }
  .title { font-size: 19px; font-weight: 700; line-height: 1.5; }
  .desc { margin-top: 6px; font-size: 14px; color: var(--gray); line-height: 1.7; }
  .arrow { position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
    color: var(--border); font-size: 20px; transition: all .18s; }
  a.card:hover .arrow { color: var(--accent); right: 16px; }
  .empty { text-align: center; color: var(--gray); padding: 60px 0; font-size: 15px; }

  footer { text-align: center; margin-top: 60px; padding-top: 24px;
    border-top: 1px solid var(--border); color: var(--gray); font-size: 13px;
    letter-spacing: .2em; }
  @media (max-width: 600px) {
    header.hero { padding: 44px 20px 36px; }
    h1 { font-size: 25px; letter-spacing: .03em; }
    .subtitle { font-size: 14px; }
    .arrow { display: none; }
    a.card { padding-right: 24px; }
    .title { font-size: 17px; }
    #search { width: 100%; }
  }
</style>
</head>
<body>

<header class="hero">
  <div class="brand">YI WEN SHUO YI</div>
  <h1>以文说艺 · 文章总目录</h1>
  <div class="subtitle">所有发布过的文章、卡片与海报，一页尽收</div>
  <div class="count" id="count"></div>
</header>

<div class="wrap">
  <div class="toolbar">
    <div class="chips" id="chips"></div>
    <input id="search" type="text" placeholder="搜索标题或摘要…">
  </div>
  <div class="list" id="list"></div>
  <footer>@以文说艺</footer>
</div>

<script>
/* ============================================================
   添加新文章：在下方数组中追加一行即可，然后 git push 更新网站。
   字段：title 标题 / date 日期 / cat 分类（公众号文章·知识卡片·海报·演讲幻灯片）
        desc 一句话摘要 / url 文章链接
   ============================================================ */
const ARTICLES = [
  { title: "高桥流投影片：亚里士多德说服三要素", date: "2026-07-23", cat: "演讲幻灯片",
    desc: "Ethos 信任 · Pathos 情感 · Logos 逻辑——16页超大字幻灯片，可自动播放",
    url: "https://kevinhe99-cpu.github.io/takahashi-slides/" },
  { title: "示例：如何把公众号文章收录进来", date: "2026-07-23", cat: "公众号文章",
    desc: "在 index.html 的 ARTICLES 数组里加一行：标题、日期、分类、摘要、链接，push 后自动出现",
    url: "#" },
];

const listEl = document.getElementById('list');
const chipsEl = document.getElementById('chips');
const searchEl = document.getElementById('search');
const countEl = document.getElementById('count');
let activeCat = '全部';

const cats = ['全部', ...new Set(ARTICLES.map(a => a.cat))];
cats.forEach(c => {
  const b = document.createElement('button');
  b.className = 'chip' + (c === '全部' ? ' on' : '');
  b.textContent = c;
  b.onclick = () => {
    activeCat = c;
    chipsEl.querySelectorAll('.chip').forEach(x => x.classList.toggle('on', x.textContent === c));
    render();
  };
  chipsEl.appendChild(b);
});
searchEl.addEventListener('input', render);

function render() {
  const q = searchEl.value.trim().toLowerCase();
  const items = ARTICLES
    .filter(a => activeCat === '全部' || a.cat === activeCat)
    .filter(a => !q || (a.title + a.desc).toLowerCase().includes(q))
    .sort((a, b) => b.date.localeCompare(a.date));
  countEl.textContent = `已收录 ${ARTICLES.length} 篇`;
  listEl.innerHTML = items.length ? '' : '<div class="empty">没有找到匹配的文章</div>';
  items.forEach(a => {
    const el = document.createElement('a');
    el.className = 'card';
    el.href = a.url;
    el.target = '_blank';
    el.rel = 'noopener';
    el.innerHTML = `
      <div class="meta"><span class="cat ${a.cat}">${a.cat}</span><span class="date">${a.date}</span></div>
      <div class="title">${a.title}</div>
      <div class="desc">${a.desc}</div>
      <span class="arrow">→</span>`;
    listEl.appendChild(el);
  });
}
render();
</script>
</body>
</html>
